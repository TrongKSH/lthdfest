<main class="lineup-page" id="lineup-main">
  <div class="lineup-bg" aria-hidden="true"></div>
  <section class="lineup-inner" aria-labelledby="lineup-title">
    <div class="lineup-head">
      <h1 id="lineup-title" class="lineup-title">{{ 'lineup.title' | transloco }}</h1>
      <div class="lineup-filters" role="tablist" [attr.aria-label]="'lineup.filterAria' | transloco">
        <div
          class="filter-slider"
          [style.left]="(activeFilterIndex() * 100 / 3) + '%'"
          aria-hidden="true"
        >
          <div
            class="filter-slider-bg"
            [style.transform]="'translateX(' + (-activeFilterIndex() * 33.3333) + '%)'"
            aria-hidden="true"
          ></div>
        </div>
        <button
          type="button"
          role="tab"
          class="filter-btn"
          [class.filter-btn--active]="activeFilter() === 'all'"
          [attr.aria-selected]="activeFilter() === 'all'"
          (click)="setFilter('all')"
        >
          {{ 'lineup.all' | transloco }}
        </button>
        <button
          type="button"
          role="tab"
          class="filter-btn"
          [class.filter-btn--active]="activeFilter() === 'longtranh'"
          [attr.aria-selected]="activeFilter() === 'longtranh'"
          (click)="setFilter('longtranh')"
        >
          {{ 'lineup.longTranh' | transloco }}
        </button>
        <button
          type="button"
          role="tab"
          class="filter-btn"
          [class.filter-btn--active]="activeFilter() === 'hodau'"
          [attr.aria-selected]="activeFilter() === 'hodau'"
          (click)="setFilter('hodau')"
        >
          {{ 'lineup.hoDau' | transloco }}
        </button>
      </div>
    </div>

    @if (!filteredBands().length) {
      <p class="lineup-status">{{ 'lineup.empty' | transloco }}</p>
    } @else {
      <div class="lineup-grid">
        @for (band of filteredBands(); track band.id; let i = $index) {
          @if (band.isSecret) {
            <div
              class="lineup-card lineup-card--secret"
              role="img"
              [attr.aria-label]="'lineup.secretBand' | transloco"
            >
              <img
                class="lineup-card__secret-image"
                src="/assets/images/question.png"
                [attr.alt]="'lineup.secretBand' | transloco"
                [attr.loading]="i < 6 ? 'eager' : 'lazy'"
                [attr.fetchpriority]="i < 3 ? 'high' : 'auto'"
                decoding="async"
                width="220"
                height="220"
              />
            </div>
          } @else {
            <a
              class="lineup-card"
              [routerLink]="['/bands', band.id]"
              [attr.aria-label]="'lineup.artistAria' | transloco: { name: band.name }"
            >
              @if (band.logoUrl) {
                <img
                  class="lineup-card__logo"
                  [class.lineup-card__logo--boost]="shouldBoostLogo(band.name)"
                  [src]="band.logoUrl"
                  [alt]="band.name + ' logo'"
                  [attr.loading]="i < 6 ? 'eager' : 'lazy'"
                  [attr.fetchpriority]="i < 3 ? 'high' : 'auto'"
                  decoding="async"
                  width="420"
                  height="220"
                />
              } @else {
                <span class="lineup-card__name">{{ band.name }}</span>
              }
            </a>
          }
        }
      </div>
    }
  </section>
</main>
