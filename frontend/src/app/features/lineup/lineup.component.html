<main class="lineup-page" id="lineup-main">
  <div class="lineup-bg" aria-hidden="true"></div>
  <section class="lineup-inner" aria-labelledby="lineup-title">
    <div class="lineup-head">
      <h1 id="lineup-title" class="lineup-title">LINE-UP</h1>
      <div class="lineup-filters" role="tablist" aria-label="Line-up filter">
        <div
          class="filter-slider"
          [style.left]="(activeFilterIndex() * 100 / 3) + '%'"
          aria-hidden="true"
        >
          <div
            class="filter-slider-bg"
            [style.transform]="'translateX(' + (-activeFilterIndex() * 33.3333) + '%)'"
            aria-hidden="true"
          ></div>
        </div>
        <button
          type="button"
          role="tab"
          class="filter-btn"
          [class.filter-btn--active]="activeFilter() === 'all'"
          [attr.aria-selected]="activeFilter() === 'all'"
          (click)="setFilter('all')"
        >
          Tất cả
        </button>
        <button
          type="button"
          role="tab"
          class="filter-btn"
          [class.filter-btn--active]="activeFilter() === 'longtranh'"
          [attr.aria-selected]="activeFilter() === 'longtranh'"
          (click)="setFilter('longtranh')"
        >
          Long Tranh
        </button>
        <button
          type="button"
          role="tab"
          class="filter-btn"
          [class.filter-btn--active]="activeFilter() === 'hodau'"
          [attr.aria-selected]="activeFilter() === 'hodau'"
          (click)="setFilter('hodau')"
        >
          Hổ Đấu
        </button>
      </div>
    </div>

    @if (!filteredBands().length) {
      <p class="lineup-status">Chưa có dữ liệu nghệ sĩ.</p>
    } @else {
      <div class="lineup-grid">
        @for (band of filteredBands(); track band.id; let i = $index) {
          <a class="lineup-card" [routerLink]="['/bands', band.id]" [attr.aria-label]="'Nghệ sĩ ' + band.name">
            @if (band.logoUrl) {
              <img
                class="lineup-card__logo"
                [class.lineup-card__logo--boost]="shouldBoostLogo(band.name)"
                [src]="band.logoUrl"
                [alt]="band.name + ' logo'"
                [attr.loading]="i < 6 ? 'eager' : 'lazy'"
                [attr.fetchpriority]="i < 3 ? 'high' : 'auto'"
                decoding="async"
                width="420"
                height="220"
              />
            } @else {
              <span class="lineup-card__name">{{ band.name }}</span>
            }
          </a>
        }
      </div>
    }
  </section>
</main>
