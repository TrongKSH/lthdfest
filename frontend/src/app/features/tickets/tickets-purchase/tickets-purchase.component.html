<div class="tp-overlay" role="dialog" aria-modal="true" [attr.aria-label]="'tickets.purchase.dialogAria' | transloco">
  <div class="tp-modal">
    <button class="tp-close" type="button" [attr.aria-label]="'common.close' | transloco" (click)="onClose()">
      ×
    </button>

    <h1 class="tp-title">{{ heading() }}</h1>
    <p class="tp-sub">{{ 'tickets.purchase.tierRule' | transloco }}</p>

    <h2 class="tp-section-title">{{ 'tickets.purchase.quantityTitle' | transloco }}</h2>

    <div class="tp-stepper" role="group" [attr.aria-label]="'tickets.purchase.quantityGroupAria' | transloco">
      <button
        class="tp-stepper-btn tp-stepper-btn--minus"
        type="button"
        [attr.aria-label]="'tickets.purchase.decreaseQty' | transloco"
        [disabled]="quantity() === 0"
        (click)="decrement()"
      >
        -
      </button>

      <div class="tp-qty-box" aria-hidden="false">
        <input
          class="tp-qty-input"
          type="number"
          min="0"
          inputmode="numeric"
          [value]="quantity()"
          [attr.aria-label]="'tickets.purchase.qtyInputAria' | transloco"
          (input)="onQuantityInput($event)"
        />
      </div>

      <button
        class="tp-stepper-btn tp-stepper-btn--plus"
        type="button"
        [attr.aria-label]="'tickets.purchase.increaseQty' | transloco"
        (click)="increment()"
      >
        +
      </button>
    </div>

    <section class="tp-perks">
      <h3 class="tp-perks-title">{{ 'tickets.purchase.perksTitle' | transloco }}</h3>
      <ul class="tp-perks-list">
        @for (perk of perks(); track perk) {
          <li>{{ perk }}</li>
        }
      </ul>
    </section>

    <button class="tp-area-link" type="button" (click)="onChooseArea()">
      {{ 'tickets.purchase.chooseOtherArea' | transloco }}
    </button>

    <button
      class="tp-continue"
      type="button"
      [disabled]="quantity() <= 0"
      (click)="onContinue()"
    >
      <span class="tp-continue-label">{{ 'common.continue' | transloco }}</span>
    </button>
  </div>
</div>
