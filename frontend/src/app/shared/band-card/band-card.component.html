@if (isPlaceholder()) {
  <div class="card" aria-hidden="true">
    <span class="card-placeholder">?</span>
  </div>
} @else if (band().isSecret) {
  <div class="card" role="img" [attr.aria-label]="'bandCard.secretBand' | transloco">
    <img class="card-img" src="/assets/images/question.png" [attr.alt]="'bandCard.secretAlt' | transloco" />
  </div>
} @else {
  <a
    [routerLink]="['/bands', band().id]"
    class="card"
    [attr.aria-label]="'bandCard.viewBandAria' | transloco: { name: band().name }"
  >
    @if (band().logoUrl || band().heroUrl) {
      <img
        class="card-img"
        [class.card-img--boost]="boostLogo()"
        [src]="band().logoUrl || band().heroUrl"
        [alt]="band().name"
        loading="lazy"
        decoding="async"
        width="320"
        height="320"
      />
    } @else {
      <span class="card-placeholder">?</span>
    }
  </a>
}
