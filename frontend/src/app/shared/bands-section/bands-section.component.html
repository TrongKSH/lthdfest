<section class="bands" id="bands" aria-labelledby="bands-title">
  <h2 id="bands-title" class="title">HƠN 20 BAN NHẠC</h2>
  <div class="grid">
    <div class="grid-row grid-row--4">
      @for (slot of slotsRow1(); track $index) {
        <app-band-card
          [band]="slot.band"
          [isPlaceholder]="slot.isPlaceholder"
          [boostLogo]="shouldBoostLogo(slot.band.name)"
        />
      }
    </div>
    <div class="grid-row grid-row--3">
      @for (slot of slotsRow2(); track $index) {
        <app-band-card
          [band]="slot.band"
          [isPlaceholder]="slot.isPlaceholder"
          [boostLogo]="shouldBoostLogo(slot.band.name)"
        />
      }
    </div>
    <div class="grid-row grid-row--4">
      @for (slot of slotsRow3(); track $index) {
        <app-band-card
          [band]="slot.band"
          [isPlaceholder]="slot.isPlaceholder"
          [boostLogo]="shouldBoostLogo(slot.band.name)"
        />
      }
    </div>
  </div>
  <div class="actions">
    <span class="btn-slot">
      <a routerLink="/lineup" class="btn btn--img" aria-label="Khám phá">
        <img src="/assets/images/discover-btn.png" alt="" class="btn-img" />
      </a>
    </span>
    <span class="btn-slot">
      <a href="#info" class="btn btn--img" aria-label="Thông tin">
        <img src="/assets/images/info-btn.png" alt="" class="btn-img" />
      </a>
    </span>
  </div>
</section>
