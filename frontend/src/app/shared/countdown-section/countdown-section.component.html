<section id="countdown" class="countdown" aria-labelledby="countdown-label">
  <div class="countdown-stripes" aria-hidden="true" role="presentation">
    <img src="/assets/images/stripe-warning.png" alt="" class="countdown-stripes-img" />
  </div>
  <div class="countdown-content">
    <div class="sign sign--warning">
      <img src="/assets/images/warning.png" alt="" class="sign-bg" aria-hidden="true" />
      <span class="sign-label">WARNING</span>
      <span class="sign-value" id="countdown-label">
        @if (daysLeft() !== null) {
          Còn {{ daysLeft() }} ngày
        } @else {
          —
        }
      </span>
    </div>
    <div class="sign sign--caution">
      <img src="/assets/images/caution.png" alt="" class="sign-bg" aria-hidden="true" />
      <span class="sign-label">CAUTION</span>
      <span class="sign-value">{{ cautionDateRange }}</span>
    </div>
  </div>
</section>
