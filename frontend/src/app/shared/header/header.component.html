<header class="header" [class.header--nav-open]="menuOpen()" role="banner">
  <button
    type="button"
    class="menu-btn"
    aria-label="Toggle menu"
    [attr.aria-expanded]="menuOpen()"
    (click)="toggleMenu()"
  >
    <span class="menu-btn-bar"></span>
    <span class="menu-btn-bar"></span>
    <span class="menu-btn-bar"></span>
  </button>
  <nav class="nav" [class.nav--open]="menuOpen()" aria-label="Main navigation">
    <div
      class="nav-desktop"
      role="navigation"
      aria-label="Primary"
      (mouseleave)="onDesktopNavBarLeave()"
    >
      <div
        class="nav-item"
        [class.nav-item--submenu-open]="isDesktopSubmenuOpen('soul')"
        [class.nav-item--suppress-submenu]="suppressedDesktopSubmenu() === 'soul'"
        (mouseenter)="onDesktopNavItemEnter('soul')"
        (mouseleave)="onDesktopNavItemLeave('soul')"
        (focusin)="onDesktopNavItemEnter('soul')"
        (focusout)="onDesktopNavItemFocusOut($event, 'soul')"
      >
        <a
          routerLink="/"
          class="nav-link nav-link--top"
          routerLinkActive="nav-link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          aria-haspopup="menu"
          (click)="$event.stopPropagation(); onDesktopMenuNavigate('soul')"
        >
          Soul
        </a>
        <div class="nav-submenu" role="menu" aria-label="Soul submenu">
          <a
            routerLink="/lineup"
            class="nav-link nav-link--sub"
            role="menuitem"
            (click)="$event.stopPropagation(); onDesktopMenuNavigate('soul')"
          >
            Full Line-up
          </a>
          <a
            routerLink="/lineup"
            fragment="countdown"
            class="nav-link nav-link--sub"
            role="menuitem"
            (click)="$event.stopPropagation(); onDesktopMenuNavigate('soul')"
          >
            Running Order
          </a>
        </div>
      </div>

      <div
        class="nav-item"
        [class.nav-item--submenu-open]="isDesktopSubmenuOpen('commerce')"
        [class.nav-item--suppress-submenu]="suppressedDesktopSubmenu() === 'commerce'"
        (mouseenter)="onDesktopNavItemEnter('commerce')"
        (mouseleave)="onDesktopNavItemLeave('commerce')"
        (focusin)="onDesktopNavItemEnter('commerce')"
        (focusout)="onDesktopNavItemFocusOut($event, 'commerce')"
      >
        <a
          routerLink="/tickets"
          class="nav-link nav-link--top"
          routerLinkActive="nav-link--active"
          aria-haspopup="menu"
          (click)="$event.stopPropagation(); onDesktopMenuNavigate('commerce')"
        >
          Commerce
        </a>
        <div class="nav-submenu" role="menu" aria-label="Commerce submenu">
          <a
            routerLink="/tickets"
            class="nav-link nav-link--sub"
            role="menuitem"
            (click)="$event.stopPropagation(); onDesktopMenuNavigate('commerce')"
          >
            Tickets Info
          </a>
          <a
            href="#"
            class="nav-link nav-link--sub"
            role="menuitem"
            (click)="$event.preventDefault(); $event.stopPropagation(); onDesktopMenuNavigate('commerce')"
          >
            Merchandise (Shop)
          </a>
        </div>
      </div>

      <div
        class="nav-item"
        [class.nav-item--submenu-open]="isDesktopSubmenuOpen('info')"
        [class.nav-item--suppress-submenu]="suppressedDesktopSubmenu() === 'info'"
        (mouseenter)="onDesktopNavItemEnter('info')"
        (mouseleave)="onDesktopNavItemLeave('info')"
        (focusin)="onDesktopNavItemEnter('info')"
        (focusout)="onDesktopNavItemFocusOut($event, 'info')"
      >
        <a
          routerLink="/"
          fragment="info"
          class="nav-link nav-link--top"
          aria-haspopup="menu"
          (click)="$event.stopPropagation(); onDesktopMenuNavigate('info')"
        >
          Info
        </a>
        <div class="nav-submenu" role="menu" aria-label="Info submenu">
          <a
            routerLink="/"
            fragment="info"
            class="nav-link nav-link--sub"
            role="menuitem"
            (click)="$event.stopPropagation(); onDesktopMenuNavigate('info')"
          >
            Festival Info
          </a>
          <a
            routerLink="/faq"
            class="nav-link nav-link--sub"
            role="menuitem"
            (click)="$event.stopPropagation(); onDesktopMenuNavigate('info')"
          >
            Info Pratique
          </a>
          <a
            href="#"
            class="nav-link nav-link--sub"
            role="menuitem"
            (click)="$event.preventDefault(); $event.stopPropagation(); onDesktopMenuNavigate('info')"
          >
            Media/Press
          </a>
        </div>
      </div>
    </div>

  </nav>
  <a
    href="/"
    class="logo-wrap logo-link"
    aria-label="Soul, Commerce and Info — Về trang chủ"
    (click)="onLogoClick($event)"
  >
    <img
      class="logo"
      src="/assets/images/lthd-logo.png"
      alt="Soul, Commerce and Info"
      width="269"
      height="120"
    />
  </a>
</header>

@if (menuOpen()) {
  <div class="mobile-drawer" aria-label="Main navigation">
    <div class="nav-mobile">
      <div class="nav-group">
        <div class="nav-group-title">Soul</div>
        <a
          routerLink="/lineup"
          class="nav-link nav-link--sub"
          (click)="$event.stopPropagation(); closeMenu()"
        >
          Full Line-up
        </a>
        <a
          routerLink="/lineup"
          fragment="countdown"
          class="nav-link nav-link--sub"
          (click)="$event.stopPropagation(); closeMenu()"
        >
          Running Order
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">Commerce</div>
        <a
          routerLink="/tickets"
          class="nav-link nav-link--sub"
          (click)="$event.stopPropagation(); closeMenu()"
        >
          Tickets Info
        </a>
        <a
          href="#"
          class="nav-link nav-link--sub"
          (click)="$event.preventDefault(); $event.stopPropagation(); closeMenu()"
        >
          Merchandise (Shop)
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-group-title">Info</div>
        <a
          routerLink="/"
          fragment="info"
          class="nav-link nav-link--sub"
          (click)="$event.stopPropagation(); closeMenu()"
        >
          Festival Info
        </a>
        <a
          routerLink="/faq"
          class="nav-link nav-link--sub"
          (click)="$event.stopPropagation(); closeMenu()"
        >
          Info Pratique
        </a>
        <a
          href="#"
          class="nav-link nav-link--sub"
          (click)="$event.preventDefault(); $event.stopPropagation(); closeMenu()"
        >
          Media/Press
        </a>
      </div>
    </div>
  </div>
}
