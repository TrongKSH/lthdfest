<section class="hero" aria-label="Hero">
  <div class="hero-bg">
    <video
      #heroVideo
      class="hero-video"
      autoplay
      muted
      loop
      playsinline
      preload="metadata"
      poster="/assets/images/lthd-teaser-poster.jpg"
      [attr.aria-label]="eventName() || ('hero.teaserVideo' | transloco)"
      (loadedmetadata)="onVideoLoaded()"
      (play)="onVideoPlay()"
    >
      <source src="/assets/images/lthd-teaser.mp4" type="video/mp4" />
    </video>
    <div class="hero-bg-image" aria-hidden="true"></div>
    <div class="hero-overlay" aria-hidden="true"></div>
    @if (showPlayPrompt()) {
      <button
        type="button"
        class="hero-play-prompt"
        [attr.aria-label]="'hero.playVideo' | transloco"
        (click)="onTapToPlay()"
      >
        <span class="hero-play-icon" aria-hidden="true"></span>
        <span class="hero-play-text">{{ 'hero.tapToPlay' | transloco }}</span>
      </button>
    }
  </div>
  <a
    class="cta"
    routerLink="/tickets"
    [attr.aria-label]="'hero.buyTicketsAria' | transloco"
  >
    <span class="cta-label">{{ 'hero.buyTicketsLabel' | transloco }}</span>
  </a>
</section>
